        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .video-background video {

            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgb(6 81 245 / 11%);
            z-index: -1;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 50px);
            align-items: center;
            text-align: center;
            padding: 5px;
            position: relative;
            z-index: 1;
            box-sizing: border-box;
            max-width: 100%;
        }

        header {

            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            margin-top: 10px;
        }

        .logo-title-container {

            flex-direction: column;
            width: 100%;

            padding: 0;
            position: relative;
        }

        .logo {

            margin-left: 20px;

            z-index: 1;
            object-fit: cover;
        }

        .nav-buttons {

            flex-direction: column;
            gap: 14px;

            margin: 80px auto;
            flex-shrink: 0;
            align-items: center;

            border-radius: 25px;
            color: #2575fc;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);

            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(51, 133, 255, 0.3);
        }

            padding: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            height: calc(100vh - 500px);

            border-radius: 15px;
            padding: 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 2px solid #e1e8f0;
            position: relative;
            overflow: hidden;
            height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform-origin: center;
        }

        .region-card.hidden {
            display: none !important;
        }

        .region-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #3385FF, #2575fc, #1a5fd8);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .region-card:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        .region-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 10px 20px rgba(51, 133, 255, 0.3);
            border-color: #3385FF;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            z-index: 2;
        }

        .region-card:active {
            transform: translateY(-2px) scale(1.01);
        }

        .region-name {
            font-size: 16px;
            font-weight: bold;
            color: #1a5fd8;
            margin: 0;
            transition: color 0.3s ease;
        }

        .region-card:hover .region-name {
            color: #0d47a1;
        }

        // 当前使用的数据集
        let currentRegionData = businessAccountData;

        // 初始化区域卡片
        function initializeRegionCards() {
            const regionsGrid = document.getElementById('regionsGrid');
            regionsGrid.innerHTML = '';

            // 创建一个文档片段来批量添加卡片
            const fragment = document.createDocumentFragment();

            currentRegionData.forEach((region, index) => {
                const card = document.createElement('div');
                card.className = 'region-card';
                card.setAttribute('data-group', region.group);
                card.setAttribute('data-url', region.url);
                card.setAttribute('data-name', region.name);
                card.innerHTML = `
                    <h3 class="region-name">${region.name}</h3>
                `;

                // 使用事件委托替代直接绑定事件，提高性能
                addRippleEffect(card);

                // 将卡片添加到文档片段中
                fragment.appendChild(card);
            });

            // 将文档片段一次性添加到 DOM 中
            regionsGrid.appendChild(fragment);
        }

        // 为区域网格添加事件委托
        document.getElementById('regionsGrid').addEventListener('click', function (e) {
            // 查找点击的元素或其父级是否为区域卡片
            let target = e.target;
            while (target && target !== this) {
                if (target.classList.contains('region-card')) {
                    const url = target.getAttribute('data-url');
                    openRegion(url);
                    break;
                }
                target = target.parentElement;
            }
        });

        // 显示区域管理看板 - 支持传入账户类型参数
        function showRegionDashboard(type = 'business') {
            document.querySelector('.container').style.display = 'none';
            document.querySelector('.region-dashboard').style.display = 'block';
            document.querySelector('.back-btn').style.display = 'block';

            // 根据类型选择对应的数据集和标题
            if (type === 'union') {
                currentRegionData = unionAccountData;
                document.querySelector('h1').textContent = '工会账户在线管理系统';
            } else if (type === 'party') {
                currentRegionData = partyAccountData;
                document.querySelector('h1').textContent = '党费账户在线管理系统';
            } else {
                currentRegionData = businessAccountData;
                document.querySelector('h1').textContent = '银行账户情况在线管理系统';
            }

            // 初始化卡片之前，先设置默认选中"全部区域"
            initializeRegionCards();

            // 获取所有过滤按钮并设置"全部区域"为活跃状态
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 默认激活"全部区域"按钮
            const allFilterBtn = document.querySelector('.filter-btn[data-group="all"]');
            if (allFilterBtn) {
                allFilterBtn.classList.add('active');
            }

            // 同时显示所有区域
            filterRegions('all');
        }

        // 隐藏区域管理看板
        function hideRegionDashboard() {
            document.querySelector('.container').style.display = 'flex';
            document.querySelector('.region-dashboard').style.display = 'none';
            document.querySelector('.back-btn').style.display = 'none';
        }

        // 区域过滤功能
        document.querySelectorAll('.filter-btn').forEach(button => {
            button.addEventListener('click', function () {
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                this.classList.add('active');

                const group = this.getAttribute('data-group');
                filterRegions(group);
            });
        });

        // 优化 filterRegions 函数
        function filterRegions(group) {
            const cards = document.querySelectorAll('.region-card');
            let hiddenCount = 0;

            // 使用一个数组来存储需要隐藏或显示的卡片
            const actions = [];

            cards.forEach(card => {
                if (group === 'all' || card.getAttribute('data-group') === group) {
                    actions.push({ element: card, action: 'show' });
                } else {
                    actions.push({ element: card, action: 'hide' });
                }
            });

            // 批量执行显示或隐藏操作
            actions.forEach(action => {
                if (action.action === 'show') {
                    action.element.classList.remove('hidden');
                } else {
                    action.element.classList.add('hidden');
                }
            });
        }


        // 打开区域链接
        function openRegion(url) {
            if (!url) {
                alert('该区域链接暂未配置');
                return;
            }
            window.open(url, '_blank', 'noopener,noreferrer');
        }

        // 为元素添加涟漪效果
        function addRippleEffect(element) {
            // 检查元素是否已经有涟漪事件监听器
            if (element.hasAttribute('data-ripple-bound')) {
                return;
            }

            element.addEventListener('click', function (e) {
                const ripple = document.createElement('span');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;

                ripple.style.cssText = `
                    position: absolute;
                    border-radius: 50%;
                    background: rgba(51, 133, 255, 0.3);
                    transform: scale(0);
                    animation: ripple 0.6s linear;
                    width: ${size}px;
                    height: ${size}px;
                    top: ${y}px;
                    left: ${x}px;
                    z-index: 0;
                `;

                this.appendChild(ripple);

                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });

            // 标记元素已经绑定了涟漪效果
            element.setAttribute('data-ripple-bound', 'true');
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function () {
            // 添加涟漪动画样式
            const style = document.createElement('style');
            style.textContent = `
                @keyframes ripple {
                    to {
                        transform: scale(4);
                        opacity: 0;
                    }
                }
            `;
            document.head.appendChild(style);

            // 添加返回按钮
            const backButton = document.createElement('button');
            backButton.className = 'back-btn';
            backButton.textContent = '返回主菜单';
            backButton.onclick = function () {
                hideRegionDashboard();
            };
            document.body.appendChild(backButton);
        });

        // 在新标签页中打开链接
        function openLink(url) {
            if (!url) {
                console.error('URL is required');
                return;
            }

            try {
                window.open(url, '_blank', 'noopener,noreferrer');
            } catch (error) {
                console.error('Failed to open link:', error);
            }
        }
    </script>
